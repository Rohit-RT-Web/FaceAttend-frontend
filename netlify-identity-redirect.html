<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Please wait...</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        flex-direction: column;
        gap: 16px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #00ff88;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <p>Please wait...</p>

    <script>
      // Yeh page password reset / invite emails ke liye hai
      // Netlify Identity token yahan handle hota hai
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            // Token process hone ke baad login event fire hoga
            window.netlifyIdentity.on("login", function () {
              // Main site pe wapas bhejo
              document.location.href = "/";
            });
          } else {
            // Already logged in — main site pe bhejo
            document.location.href = "/";
          }
        });
      }
    </script>
  </body>
</html>
